---
- name: Automatically Create Minecraft EC2 Server
  hosts: localhost
  connection: localhost
  gather_facts: no

  tasks:
    - name: Create IAM role for SSM
      amazon.aws.iam_role:
        name: SSM-Role
        assume_role_policy_document: >
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "ec2.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
          state: present
      register: iam_role

    - name: Attach SSM policy
      command: >
        aws iam attach-role-policy
        --role-name SSM-Role
        --policy-arn arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

    - name: Make instance profile
      amazon.aws.iam_instance_profile:
        name: SSM-profile
        state: present
      
    - name: Bind role to instance profile
      amazon.aws.iam_instance_profile:
        name: SSM-profile
        role: SSM-role
        state: present

    - name: Retrieve my public IP
      uri:
        url: https://checkip.amazonaws.com
        return_content: yes
      register: ip
    - name: Set my public IP
      set_fact:
        my_ip: "{{ ip.content | trim }}"
    - name: Create EC2 key pair
      amazon.aws.ec2_key:
        name: auto-minecraft-key
        region: us-east-1
        key_type: rsa
        state: present
      register: key_result

    - name: Create Security group
      amazon.aws.ec2_security_group:
        profile: default
        name: Auto Minecraft Server SG
        description: Minecraft Server SG Configuration for Server Connection
        region: us-east-1
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: "{{ my_ip }}/32"
            rule_desc: allow ssh from my ip
          - proto: tcp
            ports:
              - 25565
            cidr_ip: 0.0.0.0/0
            rule_desc: allow all on port 25565
      register: sg_result

    - name: Launching EC2 instances
      community.aws.ec2_instance:
        profile: default
        name: Auto Minecraft Server
        key_name: auto-minecraft-key
        security_group: Auto Minecraft Server SG
        instance_type: t4g.small
        image_id: ami-0576ef8e344fbf536
        state: present
        region: us-east-1
        iam_instance_profile:
          name: SSM-profile
        network:
          assign_public_ip: yes