---
- name: Automatically Create Minecraft EC2 Server
  hosts: localhost
  connection: localhost
  gather_facts: no

  tasks:
    - name: Retrieve my public IP
      uri:
        url: https://checkip.amazonaws.com
        return_content: yes
      register: ip

    - name: Set my public IP
      set_fact:
        my_ip: "{{ ip.content | trim }}"

    - name: Create EC2 key pair
      amazon.aws.ec2_key:
        name: auto-minecraft-key
        region: us-east-1
        key_type: rsa
        state: present
      register: key_result

    - name: Create Security group
      amazon.aws.ec2_security_group:
        profile: default
        name: Auto Minecraft Server SG
        description: Minecraft Server SG Configuration for Server Connection
        region: us-east-1
        rules:
          - proto: tcp
            ports:
              - 22
            cidr_ip: "{{ my_ip }}/32"
            rule_desc: allow ssh from my ip
          - proto: tcp
            ports:
              - 25565
            cidr_ip: 0.0.0.0/0
            rule_desc: allow all on port 25565
      register: sg_result

    - name: Launching EC2 instances
      community.aws.ec2_instance:
        profile: default
        name: Auto Minecraft Server
        key_name: auto-minecraft-key
        security_group: Auto Minecraft Server SG
        instance_type: t4g.small
        image_id: ami-0576ef8e344fbf536
        state: present
        region: us-east-1
        network:
          assign_public_ip: yes

    - name: Retrieve launched instance
      community.aws.ec2_instance_info:
        filters:
          "tag:Name": "Auto Minecraft Server"
          instance-state-name: running
      register: ec2

    - name: Put instance in inventory
      add_host:
        name: minecraft
        groups: minecraft
        ansible_host: "{{ ec2.instances[0].public_ip_address }}"
        ansible_user: ec2-user
        ansible_ssh_private_key_file: auto-minecraft-key.pem